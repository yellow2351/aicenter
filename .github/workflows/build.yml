name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Node.js dependencies
      run: npm install
    
    - name: Prepare Android assets
      run: |
        chmod +x scripts/*.sh
        ./scripts/download-runtime.sh
        ./scripts/prepare-android-assets.sh
    
    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: ai-agent-control-center-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
        tag_name: v1.0.0
        name: AI Agent 中控台 v1.0.0
        body: |
          AI Agent 中控台 Android 应用
          
          功能特性：
          - 完全独立运行，无需预装 Termux
          - 后台静默运行，用户无感知
          - 支持 SillyTavern/AstrBot/Ollama/Kobold AI
          - Neumorphism 设计风格
          - WebSocket 实时状态监控
          
          安装说明：
          1. 下载 APK 文件
          2. 在 Android 设备上安装
          3. 首次启动会自动初始化环境（约 10-20 秒）
          4. 开始使用
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
